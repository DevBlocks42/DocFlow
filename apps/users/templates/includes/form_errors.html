{% if form.non_field_errors %}
<div class="text-danger mb-3">
    {% for error in form.non_field_errors %}
        {{ error }}<br>
    {% endfor %}
</div>
{% endif %}

{% for field in form %}
<div class="mb-3">
    {% for error in field.errors %}
        <div class="text-danger">{{ error }}</div>
    {% endfor %}
    <label class="form-label">{{ field.label }}</label>
    {{ field }}
</div>
{% endfor %}
