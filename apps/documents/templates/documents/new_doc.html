{% extends "base.html" %}

{% block title %}Nouveau document{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2>Créer un nouveau document</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            {% for error in field.errors %}
                <div class="text-danger">{{ error }}</div>
            {% endfor %}
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
        </div>
        {% endfor %}  
        <button type="submit" name="form-submit" class="btn btn-warning">Valider</button>
    </form>
</div>
{% endblock %}
