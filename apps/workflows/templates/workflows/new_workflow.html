{% extends "base.html" %}

{% block title %}Documents{% endblock %}

{% block content %}

<form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
        {% for error in field.errors %}
            <div class="text-danger">{{ error }}</div>
        {% endfor %}
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
    </div>
    {% endfor %}  
    <button type="submit" name="form-submit" class="btn btn-warning">Soumettre le document</button>
</form>

{% endblock %}
